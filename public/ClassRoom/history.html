<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全球文明交互实验室 - 离线全集成版</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/element-plus/2.3.8/index.css">
    <script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://cdn.staticfile.org/element-plus/2.3.8/index.full.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0d1117; --panel: #161b22; }
        body { margin: 0; background: var(--bg); font-family: 'PingFang SC', serif; color: #c9d1d9; overflow: hidden; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        .header { background: #010409; padding: 10px 40px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .year-title { font-size: 32px; font-weight: bold; color: var(--gold); font-family: 'Georgia', serif; }
        .main { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; }
        
        /* 地图展示区 */
        .map-section { flex: 2; background: #000; border-radius: 16px; position: relative; border: 1px solid #30363d; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .base-map { width: 100%; height: 100%; object-fit: contain; }
        
        /* 侧边史实长廊 */
        .sidebar { flex: 0.8; display: flex; flex-direction: column; height: 100%; }
        .scroll-container { flex: 1; overflow-y: auto; padding-right: 10px; }
        .scroll-container::-webkit-scrollbar { width: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        .fact-card { background: var(--panel); border: 1px solid #30363d; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--gold); transition: transform 0.2s; }
        .fact-card:hover { transform: translateX(-5px); }
        .fact-year { color: var(--gold); font-weight: bold; font-size: 14px; }
        .fact-title { color: #f0f6fc; font-size: 16px; font-weight: 600; margin: 5px 0; }
        .fact-desc { font-size: 13px; line-height: 1.5; color: #8b949e; }

        .footer { background: #010409; padding: 30px 60px; border-top: 1px solid #30363d; }
        .el-slider__marks-text { color: #484f58 !important; font-size: 11px; white-space: nowrap; }
    </style>
</head>
<body>
<div id="app">
    <header class="header">
        <div>
            <h2 style="margin:0; color:var(--gold)">🏛️ 全球文明交互通史</h2>
            <div style="font-size:12px; color:#484f58">内嵌 Base64 底图 | 非线性时间轴 | 110+ 史实补完</div>
        </div>
        <div class="year-title">{{ formatYear(currentYear) }}</div>
    </header>

    <main class="main">
        <div class="map-section">
            <img :src="mapBase64" class="base-map" alt="World Map">
        </div>

        <aside class="sidebar">
            <div class="scroll-container">
                <el-card v-for="fact in eraFacts" :key="fact.title" class="fact-card" shadow="never">
                    <div class="fact-year">{{ formatYear(fact.year) }}</div>
                    <div class="fact-title">{{ fact.title }}</div>
                    <div class="fact-desc">{{ fact.content }}</div>
                </el-card>
            </div>
        </aside>
    </main>

    <footer class="footer">
        <el-slider v-model="sliderVal" :min="0" :max="100" :step="0.01" :marks="timelineMarks" @input="syncYear"></el-slider>
    </footer>
</div>
