<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 手势隔空绘图系统</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1e1e1e; font-family: 'Segoe UI', sans-serif; }
        
        /* 容器用于镜像翻转，符合镜子直觉 */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            transform: scaleX(-1); /* 镜像翻转 */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 视频层最底层 */
        #video_canvas { z-index: 1; opacity: 0.6; }
        /* 绘画层 */
        #draw_canvas { z-index: 2; }
        /* 粒子特效层 */
        #particle_canvas { z-index: 3; pointer-events: none; }
        /* UI层最顶层 */
        #ui_canvas { z-index: 4; }

        /* 提示层（不镜像） */
        #info {
            position: absolute;
            top: 10px;
            right: 10px; /* 因为父级镜像了，所以这里写Right其实显示在左边 */
            color: #00ffcc;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
            transform: scaleX(-1); /* 文字要是正的 */
            pointer-events: none;
            max-width: 300px;
        }
        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(50%, -50%) scaleX(-1); /* 居中修正 */
            color: white;
            font-size: 24px;
            z-index: 20;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none"></video>
    <canvas id="video_canvas"></canvas>
    <canvas id="draw_canvas"></canvas>
    <canvas id="particle_canvas"></canvas>
    <canvas id="ui_canvas"></canvas>
    
    <div id="info">
        <h3>操作指南</h3>
        <p>🖐 <b>张开手掌</b>：打开/关闭 菜单</p>
        <p>☝️ <b>食指</b>：选择菜单按钮</p>
        <p>👌 <b>捏合拇指食指</b>：写字/绘画</p>
        <p>✌️ <b>剪刀手</b>：笔迹化雪消失</p>
        <p>👈 👉 <b>双手食指</b>：拉伸缩放画布</p>
    </div>
    <div id="loading" class="loading">正在加载 AI 模型...</div>
</div>

<script>
    // --- 配置与变量 ---
    const videoElement = document.getElementById('input_video');
    const canvasVideo = document.getElementById('video_canvas');
    const ctxVideo = canvasVideo.getContext('2d');
    const canvasDraw = document.getElementById('draw_canvas');
    const ctxDraw = canvasDraw.getContext('2d');
    const canvasUI = document.getElementById('ui_canvas');
    const ctxUI = canvasUI.getContext('2d');
    const canvasParticle = document.getElementById('particle_canvas');
    const ctxParticle = canvasParticle.getContext('2d');
    const loadingDiv = document.getElementById('loading');

    let width, height;
    
    // 绘画状态
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let currentTool = 'pen'; // 'pen' or 'eraser'
    let currentColor = '#00FF00';
    let currentSize = 5;
    let canvasScale = 1;
    let canvasOffset = {x: 0, y: 0}; // 暂未实现拖拽，保留结构
    
    // 双手缩放状态
    let lastPinchDist = null;

    // UI 状态
    let showMenu = false;
    let menuCooldown = 0; // 防止闪烁
    const buttons = [];

    // 粒子系统
    let particles = [];
    let isExploding = false;

    // --- 初始化画布尺寸 ---
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        [canvasVideo, canvasDraw, canvasUI, canvasParticle].forEach(c => {
            c.width = width;
            c.height = height;
        });
        initMenu();
    }
    window.addEventListener('resize', resize);
    resize();

    // --- MediaPipe Hands 设置 ---
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start().then(() => {
        loadingDiv.style.display = 'none';
    });

    // --- 核心逻辑 ---

    function onResults(results) {
        // 1. 绘制视频背景
        ctxVideo.save();
        ctxVideo.drawImage(results.image, 0, 0, width, height);
        ctxVideo.restore();

        // 清空 UI 层
        ctxUI.clearRect(0, 0, width, height);
        
        // 渲染粒子特效
        updateParticles();

        // 如果没有手，直接返回
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            lastPinchDist = null;
            return;
        }

        // 处理手势
        const landmarksList = results.multiHandLandmarks;
        
        // --- 双手手势：缩放 ---
        if (landmarksList.length === 2) {
            handleTwoHandZoom(landmarksList[0], landmarksList[1]);
        } else {
            lastPinchDist = null;
        }

        // --- 单手手势：遍历每一只手 ---
        for (const landmarks of landmarksList) {
            drawHandSkeleton(ctxUI, landmarks); // 绘制骨架方便调试

            // 获取关键点坐标 (0-1 转为 像素)
            const indexTip = { x: landmarks[8].x * width, y: landmarks[8].y * height };
            const thumbTip = { x: landmarks[4].x * width, y: landmarks[4].y * height };
            const middleTip = { x: landmarks[12].x * width, y: landmarks[12].y * height };
            const ringTip = { x: landmarks[16].x * width, y: landmarks[16].y * height };
            const pinkyTip = { x: landmarks[20].x * width, y: landmarks[20].y * height };

            // 1. 检测“张开手掌” (Open Palm) -> 切换菜单
            if (isPalmOpen(landmarks) && Date.now() > menuCooldown) {
                showMenu = !showMenu;
                menuCooldown = Date.now() + 1000; // 1秒冷却
            }

            // 2. 绘制菜单 UI
            if (showMenu) {
                drawMenu();
                // 检测食指点击菜单 (仅当没有捏合写字时)
                if (!isPinch(landmarks)) {
                    checkMenuClick(indexTip);
                    drawCursor(indexTip, 'pointer');
                }
            } else {
                // 3. 检测“剪刀手” (Peace) -> 清屏特效
                if (isPeaceSign(landmarks) && !isExploding) {
                    startExplosion();
                }

                // 4. 检测“捏合” (Pinch) -> 写字
                if (isPinch(landmarks)) {
                    // 计算捏合中心点
                    const midX = (indexTip.x + thumbTip.x) / 2;
                    const midY = (indexTip.y + thumbTip.y) / 2;
                    
                    // 修正缩放带来的坐标偏移 (简单起见，我们对 drawCanvas 做 transform，所以坐标需要反算)
                    // 但为了笔迹平滑，我们最好直接操作 ImageContext，这里采用缩放 canvas style 的方式，
                    // 所以写入坐标需要除以 scale.
                    const drawX = (midX - width/2) / canvasScale + width/2;
                    const drawY = (midY - height/2) / canvasScale + height/2;

                    if (!isDrawing) {
                        isDrawing = true;
                        lastX = drawX;
                        lastY = drawY;
                    } else {
                        ctxDraw.beginPath();
                        ctxDraw.moveTo(lastX, lastY);
                        ctxDraw.lineTo(drawX, drawY);
                        ctxDraw.strokeStyle = currentTool === 'eraser' ? 'rgba(0,0,0,1)' : currentColor;
                        ctxDraw.lineWidth = currentSize;
                        ctxDraw.lineCap = 'round';
                        ctxDraw.lineJoin = 'round';
                        if (currentTool === 'eraser') {
                            ctxDraw.globalCompositeOperation = 'destination-out';
                        } else {
                            ctxDraw.globalCompositeOperation = 'source-over';
                        }
                        ctxDraw.stroke();
                        lastX = drawX;
                        lastY = drawY;
                    }
                    drawCursor({x: midX, y: midY}, 'pen');
                } else {
                    isDrawing = false;
                    drawCursor(indexTip, 'hover');
                }
            }
        }
    }

    // --- 手势识别算法 ---

    function distance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // 检测捏合 (食指与拇指距离很近)
    function isPinch(landmarks) {
        const d = distance(landmarks[8], landmarks[4]);
        return d < 0.05; 
    }

    // 检测全手张开 (5指指尖都离手掌根部较远，且手指是直的)
    // 简化版：检测食指、中指、无名指、小指都伸直
    function isPalmOpen(landmarks) {
        // 简单判断：指尖(8,12,16,20) y坐标 小于 关节(6,10,14,18) (注意y向下为大，但这里是归一化坐标)
        // 更鲁棒的方法是判断手指是否弯曲。
        // 这里使用简单的伪代码逻辑：如果食指、中指、无名指、小指伸直，且拇指没有捏合
        const isFingerOpen = (tip, pip) => distance(landmarks[tip], landmarks[0]) > distance(landmarks[pip], landmarks[0]);
        return isFingerOpen(8,6) && isFingerOpen(12,10) && isFingerOpen(16,14) && isFingerOpen(20,18) && !isPinch(landmarks);
    }

    // 检测剪刀手 (食指中指伸直，其他弯曲)
    function isPeaceSign(landmarks) {
        const isExtended = (tip, pip) => distance(landmarks[tip], landmarks[0]) > distance(landmarks[pip], landmarks[0]) * 1.2;
        const isCurled = (tip, pip) => distance(landmarks[tip], landmarks[0]) < distance(landmarks[pip], landmarks[0]);
        
        return isExtended(8, 6) && isExtended(12, 10) && isCurled(16, 14) && isCurled(20, 18);
    }

    // 双手缩放逻辑
    function handleTwoHandZoom(hand1, hand2) {
        // 使用两个食指指尖的距离
        const p1 = hand1[8];
        const p2 = hand2[8];
        const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

        if (lastPinchDist !== null) {
            const delta = dist - lastPinchDist;
            if (Math.abs(delta) > 0.01) { // 阈值防抖
                canvasScale += delta * 2; // 缩放灵敏度
                canvasScale = Math.max(0.5, Math.min(canvasScale, 3.0)); // 限制缩放范围
                
                // 应用缩放 CSS
                canvasDraw.style.transform = `scale(${canvasScale})`;
            }
        }
        lastPinchDist = dist;
    }

    // --- UI 系统 ---

    function initMenu() {
        buttons.length = 0; // clear
        const btnW = 80, btnH = 50;
        const startX = width / 2 - 200;
        const startY = height / 2 - 150;

        // 颜色按钮
        const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FFFFFF'];
        colors.forEach((c, i) => {
            buttons.push({type: 'color', val: c, x: startX + i * 90, y: startY, w: 60, h: 60, label: ''});
        });

        // 大小按钮
        buttons.push({type: 'size', val: 2, x: startX, y: startY + 80, w: 80, h: 50, label: '细笔'});
        buttons.push({type: 'size', val: 5, x: startX + 100, y: startY + 80, w: 80, h: 50, label: '中笔'});
        buttons.push({type: 'size', val: 15, x: startX + 200, y: startY + 80, w: 80, h: 50, label: '粗笔'});

        // 工具按钮
        buttons.push({type: 'tool', val: 'pen', x: startX, y: startY + 160, w: 100, h: 50, label: '✏️ 笔'});
        buttons.push({type: 'tool', val: 'eraser', x: startX + 120, y: startY + 160, w: 100, h: 50, label: '🧽 擦'});
    }

    function drawMenu() {
        // 半透明背景
        ctxUI.fillStyle = 'rgba(30, 30, 30, 0.9)';
        ctxUI.roundRect(width/2 - 250, height/2 - 200, 500, 450, 20);
        ctxUI.fill();

        ctxUI.textAlign = "center";
        ctxUI.textBaseline = "middle";
        ctxUI.font = "16px Arial";

        buttons.forEach(btn => {
            ctxUI.beginPath();
            
            // 高亮选中状态
            let isSelected = false;
            if (btn.type === 'tool' && currentTool === btn.val) isSelected = true;
            if (btn.type === 'color' && currentColor === btn.val) isSelected = true;
            if (btn.type === 'size' && currentSize === btn.val) isSelected = true;

            if (isSelected) {
                ctxUI.strokeStyle = "#FFFFFF";
                ctxUI.lineWidth = 3;
                ctxUI.shadowBlur = 10;
                ctxUI.shadowColor = "white";
            } else {
                ctxUI.strokeStyle = "#555";
                ctxUI.lineWidth = 1;
                ctxUI.shadowBlur = 0;
            }

            if (btn.type === 'color') {
                ctxUI.fillStyle = btn.val;
                ctxUI.rect(btn.x, btn.y, btn.w, btn.h);
                ctxUI.fill();
                ctxUI.stroke();
            } else {
                ctxUI.fillStyle = '#444';
                ctxUI.rect(btn.x, btn.y, btn.w, btn.h);
                ctxUI.fill();
                ctxUI.stroke();
                ctxUI.fillStyle = '#FFF';
                ctxUI.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2);
            }
            
            // reset shadow
            ctxUI.shadowBlur = 0;
        });
    }

    let clickCooldown = 0;
    function checkMenuClick(pos) {
        if (Date.now() < clickCooldown) return;

        buttons.forEach(btn => {
            if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                if (btn.type === 'color') currentColor = btn.val;
                if (btn.type === 'size') currentSize = btn.val;
                if (btn.type === 'tool') currentTool = btn.val;
                clickCooldown = Date.now() + 300; // 防连点
            }
        });
    }

    function drawCursor(pos, type) {
        ctxUI.beginPath();
        ctxUI.arc(pos.x, pos.y, 10, 0, 2 * Math.PI);
        if (type === 'pen') {
            ctxUI.fillStyle = currentTool === 'eraser' ? 'white' : currentColor;
        } else {
            ctxUI.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctxUI.strokeStyle = 'white';
            ctxUI.stroke();
        }
        ctxUI.fill();
    }

    function drawHandSkeleton(ctx, landmarks) {
        drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 1});
    }

    // --- 粒子消失特效 (雪花) ---

    function startExplosion() {
        isExploding = true;
        // 1. 获取当前画布像素
        const imgData = ctxDraw.getImageData(0, 0, width, height);
        const data = imgData.data;

        // 2. 采样生成粒子 (步长为4，减少性能消耗)
        for (let y = 0; y < height; y += 4) {
            for (let x = 0; x < width; x += 4) {
                const i = (y * width + x) * 4;
                if (data[i + 3] > 0) { // 如果不是透明的
                    particles.push({
                        x: x,
                        y: y,
                        r: data[i],
                        g: data[i+1],
                        b: data[i+2],
                        a: data[i+3] / 255,
                        vx: (Math.random() - 0.5) * 2, // 随机水平漂移
                        vy: Math.random() * 2 + 1 // 向下掉落
                    });
                }
            }
        }

        // 3. 清空原画布
        ctxDraw.clearRect(0, 0, width, height);
    }

    function updateParticles() {
        if (particles.length === 0) {
            isExploding = false;
            return;
        }

        ctxParticle.clearRect(0, 0, width, height);

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.a -= 0.01; // 慢慢消失

            if (p.a <= 0 || p.y > height) {
                particles.splice(i, 1);
            } else {
                ctxParticle.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.a})`;
                ctxParticle.fillRect(p.x, p.y, 2, 2); // 绘制微小方块作为雪花
            }
        }
    }

    // 辅助函数：绘制圆角矩形
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
    }

</script>
</body>
</html>
