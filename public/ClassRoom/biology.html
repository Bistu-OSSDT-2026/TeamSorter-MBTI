<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>细胞有丝分裂全能演示系统 - 视觉增强版</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --bg: #f5f7fa;
            --spindle: #a2cffe; /* 浅蓝色纺锤体 */
            --chromosome: #e74c3c; /* 红色染色体 */
            --wall: #2e7d32; /* 深绿色细胞壁 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Arial, sans-serif; }
        body { background-color: var(--bg); padding: 20px; }
        .container { max-width: 1500px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--dark); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { color: var(--dark); font-size: 2.2rem; flex: 1; }

        .control-panel { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-active { outline: 3px solid var(--primary); transform: scale(1.05); }

        .demo-area { display: flex; flex-wrap: wrap; gap: 25px; align-items: flex-start; }
        
        .animation-box {
            flex: 2;
            min-width: 750px;
            height: 650px;
            background: #ffffff;
            border: 2px solid var(--dark);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        #canvasContainer { width: 100%; height: 100%; }

        .info-box { flex: 1; min-width: 400px; padding: 25px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .stage-tag { display: inline-block; padding: 4px 12px; background: var(--primary); color: white; border-radius: 20px; font-size: 0.9rem; margin-bottom: 10px; }
        
        .feature-list { list-style: none; margin-top: 15px; font-size: 1.1rem; }
        .feature-list li { margin-bottom: 12px; padding-left: 20px; position: relative; line-height: 1.5; }
        .feature-list li::before { content: "•"; color: var(--primary); font-weight: bold; position: absolute; left: 0; }
        .error-tip { color: var(--danger); font-size: 0.9rem; display: block; margin-top: 4px; border-left: 3px solid var(--danger); padding-left: 10px; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .data-table th { background: var(--primary); color: white; }

        .chart-area { height: 220px; margin-top: 20px; }

        @media (max-width: 1200px) {
            .demo-area { flex-direction: column; }
            .animation-box { min-width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header-title">🌿 植物细胞有丝分裂全能演示系统</h1>
            <button class="btn btn-primary" id="resetBtn"><i class="fas fa-redo"></i> 重置演示</button>
        </div>

        <div class="control-panel">
            <button class="btn btn-secondary" id="prevBtn"><i class="fas fa-chevron-left"></i> 上一阶段</button>
            <button class="btn btn-primary" id="playBtn" style="min-width: 130px;"><i class="fas fa-play"></i> 自动播放</button>
            <button class="btn btn-secondary" id="nextBtn">下一阶段 <i class="fas fa-chevron-right"></i></button>
            
            <select class="btn" id="speedSelect" style="background: white; border: 1px solid #ddd; color: #333;">
                <option value="3000">速度：慢速</option>
                <option value="1800" selected>速度：标准</option>
                <option value="800">速度：快速</option>
            </select>

            <div style="display: flex; background: #eee; padding: 5px; border-radius: 8px; gap: 5px;">
                <button class="btn btn-primary btn-active" id="plantBtn"><i class="fas fa-leaf"></i> 植物细胞</button>
            </div>
        </div>

        <div class="demo-area">
            <div class="animation-box">
                <div id="canvasContainer"></div>
            </div>

            <div class="info-box">
                <span class="stage-tag" id="stageTag">阶段 1/6</span>
                <h2 id="stageTitle" style="color: var(--dark); margin-bottom: 10px;">间期 (Interphase)</h2>
                
                <ul class="feature-list" id="featureList"></ul>

                <table class="data-table">
                    <thead>
                        <tr><th>指标</th><th>染色体</th><th>核DNA</th><th>染色单体</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>当前数量</td>
                            <td id="countChr">4</td>
                            <td id="countDna">4→8</td>
                            <td id="countSist">0→8</td>
                        </tr>
                    </tbody>
                </table>

                <div class="chart-area">
                    <canvas id="mitosisChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const stages = [
            {
                name: "间期", title: "间期 (Interphase)",
                features: ["DNA分子复制", "有关蛋白质合成", "细胞有适度的生长"],
                tips: "此时染色体以染色质丝状态存在，肉眼不可见",
                chr: 4, dna: "4→8", sist: "0→8"
            },
            {
                name: "前期", title: "前期 (Prophase)",
                features: ["染色质高度螺旋化形成染色体", "核膜、核仁消失", "纺锤体出现，染色体散乱分布"],
                tips: "口诀：膜仁消失现两体",
                chr: 4, dna: 8, sist: 8
            },
            {
                name: "中期", title: "中期 (Metaphase)",
                features: ["染色体着丝粒整齐排列在赤道板上", "染色体形态固定，数目最清晰"],
                tips: "口诀：形数清晰赤道齐（最佳观察期）",
                chr: 4, dna: 8, sist: 8
            },
            {
                name: "后期", title: "后期 (Anaphase)",
                features: ["着丝粒分裂，单体分离成为子染色体", "染色体数目加倍", "纺锤丝牵引子染色体移向两极"],
                tips: "口诀：点裂数加均两极",
                chr: 8, dna: 8, sist: 0
            },
            {
                name: "末期", title: "末期 (Telophase)",
                features: ["核膜、核仁重新出现", "染色体解螺旋变为染色质", "纺锤体消失"],
                tips: "口诀：两消两现重开始",
                chr: 8, dna: 8, sist: 0
            },
            {
                name: "胞质分裂", title: "末期/子细胞形成",
                features: ["形成细胞板，向四周扩展形成新细胞壁", "形成两个完全相同的子细胞"],
                tips: "植物细胞高尔基体活跃，参与细胞壁合成",
                chr: 4, dna: 4, sist: 0
            }
        ];

        function renderCell(index) {
            const container = document.getElementById('canvasContainer');
            const colorChr = "#e74c3c"; 
            const colorSpindle = "#a2cffe"; 
            const colorWall = "#2e7d32";
            
            let svg = `<svg viewBox="0 0 600 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;

            // 1. 绘制植物细胞壁
            svg += `<rect x="50" y="50" width="500" height="400" rx="15" fill="#f9fdf9" stroke="${colorWall}" stroke-width="8" />`;

            // 2. 根据阶段绘制内容
            switch(index) {
                case 0: // 间期
                    svg += `<circle cx="300" cy="250" r="100" fill="#fdf2f2" stroke="#34495e" stroke-dasharray="5" />
                            <path d="M260,200 Q300,250 340,210 T280,300" stroke="${colorChr}" fill="none" opacity="0.5" stroke-width="2"/>
                            <path d="M240,250 Q300,200 360,280" stroke="${colorChr}" fill="none" opacity="0.4" stroke-width="2"/>`;
                    break;

                case 1: // 前期
                    // 消失的核膜
                    svg += `<circle cx="300" cy="250" r="110" fill="none" stroke="#bdc3c7" stroke-dasharray="10" opacity="0.6" />
                            <path d="M150,150 Q100,250 150,350" stroke="${colorSpindle}" fill="none" stroke-width="2" opacity="0.6" />
                            <path d="M450,150 Q500,250 450,350" stroke="${colorSpindle}" fill="none" stroke-width="2" opacity="0.6" />
                            <g transform="translate(240,200) rotate(30)"><path d="M-15,-15 L15,15 M15,-15 L-15,15" stroke="${colorChr}" stroke-width="6"/></g>
                            <g transform="translate(360,240) rotate(-20)"><path d="M-15,-15 L15,15 M15,-15 L-15,15" stroke="${colorChr}" stroke-width="6"/></g>
                            <g transform="translate(260,320) rotate(110)"><path d="M-15,-15 L15,15 M15,-15 L-15,15" stroke="${colorChr}" stroke-width="6"/></g>
                            <g transform="translate(340,310) rotate(45)"><path d="M-15,-15 L15,15 M15,-15 L-15,15" stroke="${colorChr}" stroke-width="6"/></g>`;
                    break;

                case 2: // 中期
                    // 完整的纺锤体
                    for(let i=0; i<5; i++) {
                        let offset = (i - 2) * 40;
                        svg += `<path d="M120,250 Q300,${100 + i*75} 480,250" stroke="${colorSpindle}" fill="none" stroke-width="2" opacity="0.5" />`;
                    }
                    // 赤道板参考线
                    svg += `<line x1="300" y1="80" x2="300" y2="420" stroke="#ddd" stroke-dasharray="8" />`; 
                    // 排列整齐的染色体
                    for(let i=0; i<4; i++) {
                        let y = 160 + i*60;
                        svg += `<path d="M285,${y-15} L315,${y+15} M315,${y-15} L285,${y+15}" stroke="${colorChr}" stroke-width="7" />`;
                    }
                    break;

                case 3: // 后期
                    // 牵引状态的纺锤丝
                    for(let i=0; i<4; i++) {
                        let y = 160 + i*60;
                        svg += `<path d="M120,250 L195,${y}" stroke="${colorSpindle}" stroke-width="2" opacity="0.6" />`;
                        svg += `<path d="M480,250 L405,${y}" stroke="${colorSpindle}" stroke-width="2" opacity="0.6" />`;
                        // 向两极移动的V型子染色体
                        svg += `<path d="M195,${y} L220,${y-12} M195,${y} L220,${y+12}" stroke="${colorChr}" stroke-width="5" />`;
                        svg += `<path d="M405,${y} L380,${y-12} M405,${y} L380,${y+12}" stroke="${colorChr}" stroke-width="5" />`;
                    }
                    break;

                case 4: // 末期
                    // 两个新细胞核形成
                    svg += `<circle cx="180" cy="250" r="75" fill="#fdf2f2" stroke="#34495e" />
                            <circle cx="420" cy="250" r="75" fill="#fdf2f2" stroke="#34495e" />
                            <line x1="300" y1="80" x2="300" y2="420" stroke="${colorWall}" stroke-width="12" stroke-dasharray="20,10" />`;
                    break;

                case 5: // 胞质分裂完成
                    // 分裂后的两个子细胞
                    svg += `<rect x="50" y="50" width="245" height="400" rx="10" fill="none" stroke="${colorWall}" stroke-width="6" />
                            <rect x="305" y="50" width="245" height="400" rx="10" fill="none" stroke="${colorWall}" stroke-width="6" />
                            <circle cx="160" cy="250" r="50" fill="#fdf2f2" stroke="#34495e" />
                            <circle cx="440" cy="250" r="50" fill="#fdf2f2" stroke="#34495e" />`;
                    break;
            }

            svg += `</svg>`;
            container.innerHTML = svg;
        }

        // --- 系统逻辑 ---
        let currentIndex = 0;
        let isPlaying = false;
        let timer = null;
        let myChart = null;

        function updateUI() {
            const stage = stages[currentIndex];
            document.getElementById('stageTag').innerText = `阶段 ${currentIndex + 1}/6`;
            document.getElementById('stageTitle').innerText = stage.title;
            const list = document.getElementById('featureList');
            list.innerHTML = stage.features.map(f => `<li>${f}</li>`).join('') + 
                             `<li><span class="error-tip"><i class="fas fa-lightbulb"></i> ${stage.tips}</span></li>`;
            
            document.getElementById('countChr').innerText = stage.chr;
            document.getElementById('countDna').innerText = stage.dna;
            document.getElementById('countSist').innerText = stage.sist;
            renderCell(currentIndex);
            updateChartHighlight();
        }

        function initChart() {
            const ctx = document.getElementById('mitosisChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['间期', '前期', '中期', '后期', '末期', '完成'],
                    datasets: [{
                        label: '核DNA含量',
                        data: [4, 8, 8, 8, 8, 4],
                        borderColor: '#3498db',
                        borderWidth: 3,
                        tension: 0
                    }, {
                        label: '染色体数',
                        data: [4, 4, 4, 8, 8, 4],
                        borderColor: '#e74c3c',
                        borderWidth: 3,
                        tension: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 10 } }
                }
            });
        }

        function updateChartHighlight() {
            if(!myChart) return;
            myChart.update();
        }

        document.getElementById('nextBtn').onclick = () => { currentIndex = (currentIndex + 1) % stages.length; updateUI(); };
        document.getElementById('prevBtn').onclick = () => { currentIndex = (currentIndex - 1 + stages.length) % stages.length; updateUI(); };
        document.getElementById('playBtn').onclick = function() {
            if (isPlaying) {
                clearInterval(timer);
                this.innerHTML = '<i class="fas fa-play"></i> 自动播放';
                this.className = 'btn btn-primary';
            } else {
                const speed = parseInt(document.getElementById('speedSelect').value);
                timer = setInterval(() => { currentIndex = (currentIndex + 1) % stages.length; updateUI(); }, speed);
                this.innerHTML = '<i class="fas fa-pause"></i> 暂停播放';
                this.className = 'btn btn-success';
            }
            isPlaying = !isPlaying;
        };
        document.getElementById('resetBtn').onclick = () => {
            currentIndex = 0;
            if(isPlaying) document.getElementById('playBtn').click();
            updateUI();
        };

        window.onload = () => {
            initChart();
            updateUI();
        };
    </script>
</body>
</html>
